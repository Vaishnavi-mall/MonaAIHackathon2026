<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mona AI - Agent Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-sans: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;

      --bg-base: #060912;
      --bg-surface: #0D1117;
      --bg-elevated: #161B22;
      --bg-border: #21262D;

      --brand: #2F81F7;
      --brand-hover: #388BFD;
      --brand-muted: #1F3B5C;

      --text-primary: #E6EDF3;
      --text-secondary: #8B949E;
      --text-muted: #484F58;

      --green: #3FB950;
      --green-bg: #0D2119;
      --orange: #D29922;
      --orange-bg: #2D1F00;
      --red: #F85149;
      --red-bg: #2D0F0F;
      --purple: #A371F7;
      --teal: #39D353;

      --dept-it: #2F81F7;
      --dept-finance: #A371F7;
      --dept-ops: #D29922;
      --dept-facilities: #3FB950;
      --dept-hr: #F778BA;
      --dept-other: #8B949E;

      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;
      --space-12: 48px;
      --space-16: 64px;

      --text-xs: 11px;
      --text-sm: 13px;
      --text-base: 14px;
      --text-md: 15px;
      --text-lg: 18px;
      --text-xl: 22px;
      --text-2xl: 28px;
      --text-3xl: 36px;

      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --radius-full: 9999px;

      --shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.5);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.6);
      --transition: 150ms ease;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at 20% 0%, rgba(47,129,247,0.08), transparent 30%),
        linear-gradient(180deg, #080d18 0%, var(--bg-base) 280px);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: var(--text-base);
      font-weight: 400;
      line-height: 1.6;
      letter-spacing: 0;
    }

    body.modal-open {
      overflow: hidden;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
    }

    button,
    .agent-card,
    .sidebar-item,
    .file-zone,
    .copy-btn,
    .panel-header,
    .back-link {
      -webkit-tap-highlight-color: transparent;
    }

    .app-shell {
      min-height: 100vh;
    }

    .topbar {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      padding: 0 var(--space-6);
      border-bottom: 1px solid var(--bg-border);
      background: rgba(13,17,23,0.96);
      backdrop-filter: blur(16px);
    }

    .brand-lockup,
    .topbar-right,
    .status-inline,
    .sidebar-badge,
    .agent-pill,
    .num-badge,
    .breadcrumb,
    .compliance-pills,
    .meta-row,
    .result-header,
    .summary-bar,
    .badge-row,
    .chip-row,
    .toolbar-row,
    .field-inline,
    .check-row,
    .price-line,
    .platform-row,
    .status-row {
      display: flex;
      align-items: center;
    }

    .brand-lockup {
      gap: var(--space-3);
      min-width: 0;
    }

    .logo-mark {
      display: grid;
      width: 24px;
      height: 24px;
      place-items: center;
      border-radius: var(--radius-sm);
      background: var(--brand);
      color: white;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08) inset;
    }

    .brand-name {
      color: var(--text-primary);
      font-size: 15px;
      font-weight: 600;
      line-height: 1;
      white-space: nowrap;
    }

    .hub-badge,
    .shortcut-hint,
    .compliance-pill,
    .agent-pill,
    .tiny-pill,
    .risk-pill,
    .dept-pill,
    .priority-pill,
    .impact-badge,
    .platform-pill,
    .seniority-pill,
    .code-chip {
      display: inline-flex;
      align-items: center;
      border-radius: var(--radius-full);
      white-space: nowrap;
    }

    .hub-badge {
      padding: 2px var(--space-2);
      background: var(--bg-elevated);
      color: var(--text-secondary);
      font-size: var(--text-xs);
      line-height: 1.4;
    }

    .topbar-right {
      gap: var(--space-6);
      color: var(--text-secondary);
      font-size: var(--text-sm);
      min-width: 0;
    }

    .status-inline {
      gap: var(--space-2);
      white-space: nowrap;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      flex: 0 0 auto;
      border-radius: var(--radius-full);
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(63,185,80,0.12);
    }

    .status-dot.ready {
      animation: pulseDot 1.8s ease infinite;
    }

    .status-dot.orange {
      background: var(--orange);
      box-shadow: 0 0 0 4px rgba(210,153,34,0.12);
    }

    .status-dot.red {
      background: var(--red);
      box-shadow: 0 0 0 4px rgba(248,81,73,0.12);
    }

    .status-dot.muted {
      background: var(--text-muted);
      box-shadow: none;
    }

    @keyframes pulseDot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.72); opacity: 0.72; }
    }

    .shortcut-hint {
      padding: 4px 9px;
      border: 1px solid var(--bg-border);
      background: var(--bg-elevated);
      color: var(--text-muted);
      font-size: var(--text-xs);
      line-height: 1.4;
    }

    .sidebar {
      position: fixed;
      top: 56px;
      bottom: 0;
      left: 0;
      z-index: 90;
      display: flex;
      width: 220px;
      flex-direction: column;
      border-right: 1px solid var(--bg-border);
      background: rgba(13,17,23,0.98);
    }

    .sidebar-section-label {
      padding: var(--space-4) var(--space-4) var(--space-2);
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      line-height: 1.4;
    }

    .sidebar-list {
      display: grid;
      gap: var(--space-1);
      padding: 0 var(--space-2);
    }

    .sidebar-item {
      position: relative;
      display: grid;
      grid-template-columns: 20px minmax(0, 1fr) 8px;
      gap: var(--space-3);
      align-items: center;
      min-height: 36px;
      padding: var(--space-2);
      border-radius: var(--radius-md);
      border-left: 2px solid transparent;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background var(--transition), color var(--transition), border-color var(--transition);
      text-align: left;
    }

    .sidebar-item:hover {
      background: var(--bg-elevated);
    }

    .sidebar-item.active {
      border-left-color: var(--brand);
      background: var(--brand-muted);
      color: var(--text-primary);
    }

    .num-badge {
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 4px;
      background: var(--bg-elevated);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 9px;
      line-height: 1;
    }

    .sidebar-item.active .num-badge {
      color: var(--brand-hover);
      background: rgba(47,129,247,0.12);
    }

    .sidebar-name {
      overflow: hidden;
      font-size: var(--text-sm);
      line-height: 1.5;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: var(--space-4);
      border-top: 1px solid var(--bg-border);
    }

    .sidebar-badge {
      gap: var(--space-2);
      min-height: 26px;
      color: var(--text-muted);
      font-size: var(--text-xs);
      line-height: 1.4;
    }

    .sidebar-badge svg {
      width: 14px;
      height: 14px;
      color: var(--green);
    }

    .main {
      min-height: 100vh;
      margin-left: 220px;
      margin-top: 56px;
      padding: var(--space-8);
      background: transparent;
    }

    .view {
      animation: viewIn 200ms ease both;
    }

    .view.slide-out {
      animation: viewOut 150ms ease both;
    }

    @keyframes viewIn {
      from { opacity: 0; transform: translateX(8px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes viewOut {
      from { opacity: 1; transform: translateX(0); }
      to { opacity: 0; transform: translateX(-8px); }
    }

    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-6);
      margin-bottom: var(--space-6);
    }

    .page-title {
      margin: 0;
      color: var(--text-primary);
      font-size: var(--text-2xl);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .page-subtitle {
      margin: 4px 0 0;
      color: var(--text-secondary);
      font-size: var(--text-sm);
      line-height: 1.5;
    }

    .search-wrap {
      position: relative;
      width: 180px;
      flex: 0 0 180px;
    }

    .search-wrap svg {
      position: absolute;
      top: 50%;
      left: var(--space-3);
      width: 14px;
      height: 14px;
      color: var(--text-muted);
      transform: translateY(-50%);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      height: 36px;
      padding: 0 var(--space-3) 0 34px;
      border: 1px solid var(--bg-border);
      border-radius: var(--radius-md);
      background: var(--bg-elevated);
      color: var(--text-primary);
      font-size: var(--text-sm);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(47,129,247,0.15);
    }

    .agent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--space-4);
    }

    .agent-card {
      display: flex;
      min-height: 236px;
      flex-direction: column;
      padding: var(--space-5);
      border: 1px solid var(--bg-border);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, rgba(22,27,34,0.35), rgba(13,17,23,0.98));
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition), background var(--transition);
    }

    .agent-card:hover {
      border-color: rgba(47,129,247,0.5);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .agent-card-top,
    .card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
    }

    .agent-icon {
      display: grid;
      width: 32px;
      height: 32px;
      place-items: center;
      border-radius: var(--radius-full);
      color: var(--agent-color);
      background: color-mix(in srgb, var(--agent-color) 40%, transparent);
    }

    .agent-icon svg {
      width: 17px;
      height: 17px;
      stroke-width: 2;
    }

    .card-number {
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--bg-elevated);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      line-height: 1.4;
    }

    .agent-card h2 {
      margin: var(--space-3) 0 0;
      color: var(--text-primary);
      font-size: var(--text-md);
      font-weight: 600;
      line-height: 1.6;
      letter-spacing: 0;
    }

    .customer {
      margin: 2px 0 0;
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.5;
    }

    .description {
      display: -webkit-box;
      min-height: 42px;
      margin: var(--space-2) 0 0;
      overflow: hidden;
      color: var(--text-muted);
      font-size: var(--text-sm);
      line-height: 1.6;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .card-spacer {
      flex: 1;
    }

    .agent-pill {
      gap: 6px;
      padding: 3px var(--space-2);
      background: var(--green-bg);
      color: var(--green);
      font-size: var(--text-xs);
      line-height: 1.4;
    }

    .agent-pill .status-dot {
      width: 6px;
      height: 6px;
      box-shadow: none;
    }

    .run-btn,
    .primary-btn,
    .secondary-btn,
    .copy-btn,
    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition), color var(--transition), opacity var(--transition), transform var(--transition);
    }

    .run-btn {
      gap: 6px;
      padding: 6px 14px;
      background: var(--brand);
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      line-height: 1.4;
    }

    .run-btn:hover,
    .primary-btn:hover:not(:disabled) {
      background: var(--brand-hover);
    }

    .breadcrumb-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }

    .breadcrumb {
      gap: var(--space-2);
      min-width: 0;
      color: var(--text-muted);
      font-size: var(--text-sm);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 0;
      background: transparent;
      color: var(--text-secondary);
      font-size: var(--text-sm);
      cursor: pointer;
      transition: color var(--transition);
    }

    .back-link:hover {
      color: var(--text-primary);
    }

    .crumb-title {
      overflow: hidden;
      color: var(--text-primary);
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .compliance-pills {
      justify-content: flex-end;
      gap: var(--space-2);
      flex-wrap: wrap;
    }

    .compliance-pill {
      padding: 2px var(--space-2);
      border: 1px solid var(--bg-border);
      background: var(--bg-elevated);
      color: var(--text-muted);
      font-size: 10px;
      line-height: 1.4;
    }

    .detail-layout {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: var(--space-6);
      align-items: start;
    }

    .panel,
    .info-card,
    .input-card,
    .results-card,
    .gap-card,
    .question-card,
    .scene-card,
    .platform-card,
    .segment-card,
    .mini-card,
    .file-panel {
      border: 1px solid var(--bg-border);
      border-radius: var(--radius-lg);
      background: rgba(13,17,23,0.96);
      box-shadow: var(--shadow-sm);
    }

    .info-card,
    .input-card,
    .results-card {
      padding: var(--space-6);
    }

    .large-number {
      display: grid;
      width: 40px;
      height: 40px;
      place-items: center;
      border-radius: var(--radius-md);
      background: var(--brand);
      color: white;
      font-family: var(--font-mono);
      font-size: 16px;
      line-height: 1;
    }

    .info-card h1 {
      margin: var(--space-3) 0 0;
      color: var(--text-primary);
      font-size: var(--text-xl);
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .info-card .customer {
      font-size: var(--text-sm);
    }

    .divider {
      height: 1px;
      margin: var(--space-5) 0;
      background: var(--bg-border);
    }

    .detail-desc {
      margin: 0;
      color: var(--text-secondary);
      font-size: var(--text-base);
      line-height: 1.7;
    }

    .section-label {
      display: block;
      margin-bottom: var(--space-3);
      color: var(--text-muted);
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.08em;
      line-height: 1.4;
      text-transform: uppercase;
    }

    .flow-steps {
      display: grid;
      gap: var(--space-2);
    }

    .flow-step {
      display: grid;
      grid-template-columns: 20px minmax(0, 1fr);
      gap: var(--space-3);
      align-items: start;
      color: var(--text-secondary);
      font-size: var(--text-sm);
      line-height: 1.5;
    }

    .flow-num {
      display: grid;
      width: 20px;
      height: 20px;
      place-items: center;
      border-radius: var(--radius-full);
      background: var(--bg-elevated);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 9px;
      line-height: 1;
    }

    .flow-arrow {
      margin-left: 9px;
      color: var(--text-muted);
      font-size: var(--text-xs);
      line-height: 1;
    }

    .compliance-list {
      display: grid;
      gap: var(--space-2);
    }

    .compliance-row {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.5;
    }

    .compliance-row svg {
      width: 15px;
      height: 15px;
      color: var(--green);
      flex: 0 0 auto;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-4);
    }

    .card-header h2 {
      margin: 0;
      color: var(--text-primary);
      font-size: var(--text-md);
      font-weight: 600;
      line-height: 1.6;
      letter-spacing: 0;
    }

    .card-header p {
      margin: 1px 0 0;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .form-grid {
      display: grid;
      gap: var(--space-4);
    }

    .form-grid.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .field {
      min-width: 0;
    }

    label,
    .field-label {
      display: block;
      margin-bottom: 6px;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
      line-height: 1.5;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--bg-border);
      border-radius: var(--radius-md);
      background: var(--bg-elevated);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: var(--text-base);
      line-height: 1.6;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }

    input,
    select {
      height: 42px;
      padding: 10px 14px;
    }

    textarea {
      min-height: 120px;
      padding: 10px 14px;
      resize: vertical;
    }

    input::placeholder,
    textarea::placeholder {
      color: var(--text-muted);
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(47,129,247,0.15);
    }

    select {
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--text-muted) 50%),
        linear-gradient(135deg, var(--text-muted) 50%, transparent 50%);
      background-position:
        calc(100% - 18px) 18px,
        calc(100% - 13px) 18px;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
      padding-right: 36px;
    }

    .file-zone {
      display: grid;
      min-height: 156px;
      place-items: center;
      padding: var(--space-8);
      border: 2px dashed var(--bg-border);
      border-radius: var(--radius-lg);
      background: rgba(22,27,34,0.55);
      text-align: center;
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition), transform var(--transition);
    }

    .file-zone.drag-over {
      border-color: var(--brand);
      background: rgba(47,129,247,0.05);
    }

    .file-zone svg {
      width: 24px;
      height: 24px;
      margin-bottom: var(--space-2);
      color: var(--text-muted);
    }

    .file-zone-title {
      color: var(--text-secondary);
      font-size: var(--text-base);
      line-height: 1.6;
    }

    .file-zone-subtitle {
      margin-top: 2px;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .hidden-input {
      display: none;
    }

    .file-list {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      margin-top: var(--space-3);
    }

    .file-chip {

    function icon(name, attrs = "") {
      return `<svg ${attrs} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${iconPaths[name] || iconPaths.file}</svg>`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function safe(value, fallback = "not_found") {
      if (value === null || value === undefined || value === "") return fallback;
      return escapeHtml(value);
    }

    function num(id) {
      return String(id).padStart(2, "0");
    }

    function pct(value, multiplier = 100) {
      const raw = Number(value);
      if (!Number.isFinite(raw)) return 0;
      const score = raw <= 1 ? raw * multiplier : raw;
      return Math.max(0, Math.min(100, Math.round(score)));
    }

    function money(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return safe(value);

    function deptKey(agentOrDepartment) {
      const raw = String(agentOrDepartment?.department || agentOrDepartment?.dept || agentOrDepartment || "other").toLowerCase();
      if (raw.includes("finance")) return "finance";
      if (raw.includes("it")) return "it";
      if (raw.includes("facilities")) return "facilities";
      if (raw.includes("hr")) return "hr";
      if (raw.includes("operation")) return "ops";
      return "other";
    }

    function deptColor(key) {
      const map = {
        it: "var(--dept-it)",
        finance: "var(--dept-finance)",
        operations: "var(--dept-ops)",
        ops: "var(--dept-ops)",
        facilities: "var(--dept-facilities)",
        hr: "var(--dept-hr)",
        other: "var(--dept-other)",
      };
      return map[key] || map.other;
    }

    function formatBytes(bytes) {
      const value = Number(bytes);
      if (!Number.isFinite(value) || value <= 0) return "";
      const units = ["B", "KB", "MB", "GB"];
      const i = Math.min(Math.floor(Math.log(value) / Math.log(1024)), units.length - 1);
      return `${(value / Math.pow(1024, i)).toFixed(i === 0 ? 0 : 1)} ${units[i]}`;
    }

    function bindFileZone(zone) {
      const input = zone.querySelector("input[type=file]");
      const name = input.name;
      state.selectedFiles[name] = [];
      input.addEventListener("change", () => {
        state.selectedFiles[name] = Array.from(input.files || []);
        renderFileList(name, input);
      });
      ["dragenter", "dragover"].forEach((type) => {
        zone.addEventListener(type, (event) => {
          event.preventDefault();
          zone.classList.add("drag-over");
        });
      });
      ["dragleave", "drop"].forEach((type) => {
        zone.addEventListener(type, (event) => {
          event.preventDefault();
          zone.classList.remove("drag-over");
        });
      });
      zone.addEventListener("drop", (event) => {
        const files = Array.from(event.dataTransfer.files || []);
        if (!files.length) return;
        state.selectedFiles[name] = input.multiple ? files : files.slice(0, 1);
        const dataTransfer = new DataTransfer();
        state.selectedFiles[name].forEach((file) => dataTransfer.items.add(file));
        input.files = dataTransfer.files;
        renderFileList(name, input);
      });
    }

    function renderFileList(name, input) {
      const list = document.getElementById(`${name}_list`);
      const files = state.selectedFiles[name] || [];
      if (!list) return;
      list.innerHTML = files.map((file, index) => `
        <div class="file-chip">
          ${icon("file")}
          <span>${escapeHtml(file.name)}${file.size ? ` · ${formatBytes(file.size)}` : ""}</span>

          state.selectedFiles[key].forEach((file) => dataTransfer.items.add(file));
          input.files = dataTransfer.files;
          renderFileList(key, input);
        });
      });
    }

    async function submitAgent(id, formData) {
      const agent = agentById(id);
      const submitBtn = document.getElementById("submitBtn");
      const resultsMount = document.getElementById("resultsMount");
      try {
        state.isLoading = true;
        state.results = null;
        submitBtn.disabled = true;
        submitBtn.textContent = "Processing...";
        renderSkeleton();
        startProgress(agent);

        let response;
        if ([1, 3, 4].includes(id)) {
          const files = formData.getAll("files").filter((file) => file && file.size > 0);
          if (!files.length) throw new Error("Please select at least one file.");
          const payload = new FormData();
          files.forEach((file) => payload.append("files", file));
          response = await fetch(API_BASE + agent.endpoint, { method: "POST", body: payload });
        } else if (id === 2) {
          const file = formData.get("schedule_file");
          if (!file || !file.size) throw new Error("Please upload a schedule file.");
          if (typeof XLSX !== "undefined") {
            const arrayBuffer = await file.arrayBuffer();
            const workbook = XLSX.read(new Uint8Array(arrayBuffer), { type: "array" });

            // --- Date validation against Weekly_Schedule columns ---
            const shiftDetails = formData.get("shift_details") || "";
            const dateMatch = shiftDetails.match(/\b(\d{4}-\d{2}-\d{2}|\d{2}-\d{2}-\d{4}|\d{2}\/\d{2}\/\d{4}|\d{2}\.\d{2}\.\d{4})\b/);
            if (dateMatch) {
              const raw = dateMatch[1];
              let parsed;
              if (/^\d{2}[-\/\.]\d{2}[-\/\.]\d{4}$/.test(raw)) {
                const sep = raw[2];
                const [d, m, y] = raw.split(sep);
                parsed = new Date(`${y}-${m}-${d}`);
              } else {
                parsed = new Date(raw);
              }
              if (!isNaN(parsed.getTime())) {
                const schedSheet = workbook.Sheets["Weekly_Schedule"];
                const scheduleDates = [];
                if (schedSheet) {
                  const rows = XLSX.utils.sheet_to_json(schedSheet, { header: 1 });
                  const headers = rows[0] || [];
                  const today = new Date();
                  headers.forEach((h) => {
                    if (!h || typeof h !== "string") return;
                    const m = h.match(/\b(\d{1,2})\/(\d{2})\b/);
                    if (!m) return;
                    const month = parseInt(m[1], 10) - 1;
                    const day = parseInt(m[2], 10);
                    let year = today.getFullYear();
                    let candidate = new Date(year, month, day);
                    if (candidate - today < -180 * 86400000) candidate = new Date(year + 1, month, day);
                    scheduleDates.push(candidate);
                  });
                }
                if (scheduleDates.length > 0) {
                  const inSchedule = scheduleDates.some(
                    (s) => s.getFullYear() === parsed.getFullYear() && s.getMonth() === parsed.getMonth() && s.getDate() === parsed.getDate()
                  );
                  if (!inSchedule) {
                    const fmt = (d) => d.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
                    throw new Error(`Date not in the uploaded schedule. Valid dates are: ${scheduleDates.map(fmt).join(", ")}.`);
                  }
                }
              }
            }

            // --- Name validation against Roster ---
            const absentStaff = (formData.get("absent_staff") || "").split(",")[0].trim();
            if (absentStaff) {
              const rosterSheet = workbook.Sheets["Roster"];
              if (rosterSheet) {
                const rows = XLSX.utils.sheet_to_json(rosterSheet, { header: 1 });
                const headers = (rows[0] || []).map((h) => String(h || "").toLowerCase());
                const firstIdx = headers.findIndex((h) => h.includes("first"));
                const lastIdx = headers.findIndex((h) => h.includes("last"));
                const rosterNames = rows.slice(1).map((row) => {
                  const first = firstIdx >= 0 ? String(row[firstIdx] || "") : "";
                  const last = lastIdx >= 0 ? String(row[lastIdx] || "") : "";
                  return `${first} ${last}`.trim().toLowerCase();
                }).filter(Boolean);
                const needle = absentStaff.toLowerCase();
                const found = rosterNames.some((n) => n === needle || n.includes(needle) || needle.includes(n));
                if (!found && rosterNames.length > 0) {
                  throw new Error(`"${absentStaff}" was not found in the uploaded schedule. Please check the name matches the roster exactly.`);
                }
              }
            }
          }
          response = await fetch(API_BASE + agent.endpoint, { method: "POST", body: formData });
        } else {
          const payload = jsonPayloadForAgent(id, formData);
          response = await fetch(API_BASE + agent.endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
        }

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.error || `Request failed with status ${response.status}`);
        }
        state.results = data;
        renderResult(id, data);
      } catch (error) {
        resultsMount.innerHTML = renderResultsCard(`<div class="error-card">${escapeHtml(error.message || "Network request failed.")}</div>`, null);
      } finally {
        state.isLoading = false;
        stopProgress();
        submitBtn.disabled = false;
        submitBtn.textContent = "Run Agent";
      }
    }

    function jsonPayloadForAgent(id, formData) {
      const obj = Object.fromEntries(formData.entries());
      if (id === 8) {
        const signals = {};
        ["weather", "events", "supply_chain", "season", "competitor_price", "demand_trend"].forEach((key) => {
          if (obj[key]) signals[key] = obj[key];
        });
        return { product_name: obj.product_name, base_price: Number(obj.base_price), signals };
      }
      return obj;
    }

    function startProgress(agent) {
      const progressWrap = document.getElementById("progressWrap");
      const progressLabel = document.getElementById("progressLabel");
      const progressBar = document.getElementById("progressBar");
      const batchCount = (state.selectedFiles.files || []).length;
      if (!progressWrap || !progressBar || !progressLabel || batchCount < 2 || ![1, 3, 4].includes(agent.id)) return;
      progressWrap.classList.add("visible");
      state.progressValue = 12;
      progressBar.style.width = "12%";
      state.progressTimer = setInterval(() => {
        state.progressValue = Math.min(92, state.progressValue + Math.random() * 12);
        const current = Math.min(batchCount, Math.max(1, Math.ceil((state.progressValue / 100) * batchCount)));
        progressLabel.textContent = `Processing file ${current} of ${batchCount}...`;
        progressBar.style.width = `${state.progressValue}%`;
      }, 500);
    }

    function stopProgress() {
      if (state.progressTimer) {
        clearInterval(state.progressTimer);
        state.progressTimer = null;
      }
      const progressWrap = document.getElementById("progressWrap");
      const progressBar = document.getElementById("progressBar");
      if (progressBar) progressBar.style.width = "100%";
      setTimeout(() => progressWrap?.classList.remove("visible"), 200);
    }

    function renderSkeleton() {
      const skeleton = `
        <div class="skeleton">
          <div class="skeleton-block" style="width:60%"></div>
          <div class="skeleton-block" style="width:90%"></div>
          <div class="skeleton-block" style="width:75%"></div>
          <div class="skeleton-block" style="width:46%"></div>
        </div>
      `;
      document.getElementById("resultsMount").innerHTML = renderResultsCard(skeleton, null, false);
    }

    function renderResultsCard(content, data = state.results, copy = true) {
      const timestamp = nowStamp();
      return `
        <section class="results-card">
          <div class="result-header">
            <h2>Results</h2>
            <div class="result-actions">
              ${copy && data ? `
              <div class="dl-group">
                <button class="copy-btn" type="button" data-dl-csv>${icon("download")} CSV</button>
              </div>` : ""}
            </div>
          </div>
          ${content}
        </section>
      `;
    }

    function renderResult(id, data) {
      const html = [1, 3, 4].includes(id)
        ? renderBatchResult(id, data)
        : renderSingleResult(id, data);
      const mount = document.getElementById("resultsMount");
      mount.innerHTML = renderResultsCard(html, data);
      bindResultEvents(data);
    }

    function bindResultEvents(data) {
      document.querySelectorAll("[data-dl-csv]").forEach((btn) => {
        btn.addEventListener("click", () => downloadCSV(data));
      });
      document.querySelectorAll("[data-dl-json]").forEach((btn) => {
        btn.addEventListener("click", () => downloadJSON(data));
      });
      document.querySelectorAll("[data-copy-text]").forEach((button) => {
        button.addEventListener("click", () => copyToClipboard(button.dataset.copyText, button));
      });
      document.querySelectorAll(".panel-header").forEach((button) => {
        button.addEventListener("click", () => button.closest(".file-panel").classList.toggle("open"));
      });
      document.querySelectorAll("[data-sort-results]").forEach((select) => {
        select.addEventListener("change", () => {
          const id = Number(select.dataset.agentId);
          const sorted = sortResults(id, state.results.results || [], select.value);
          document.getElementById("fileResults").innerHTML = renderFilePanels(id, sorted);
          bindResultEvents(state.results);
        });
      });
    }

    async function copyToClipboard(text, button) {
      try {
        await navigator.clipboard.writeText(text || "");
      } catch (_) {
        const area = document.createElement("textarea");
        area.value = text || "";
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        area.remove();
      }
      button.classList.add("copied");
      setTimeout(() => button.classList.remove("copied"), 950);
    }

    function downloadCSV(data) {
      const rows = Array.isArray(data?.results) ? data.results : [data];
      if (!rows.length) return;

      // Collect all scalar and array-of-primitive keys from every row
      const allKeys = [...new Set(rows.flatMap(r =>
        Object.keys(r).filter(k => {
          const v = r[k];
          return v === null || typeof v !== "object" || Array.isArray(v);
        })
      ))];

      const cell = v => {
        const s = Array.isArray(v) ? v.join("; ") : String(v ?? "");
        return `"${s.replace(/"/g, '""')}"`;
      };

      const csv = [
        allKeys.join(","),
        ...rows.map(r => allKeys.map(k => cell(r[k])).join(","))
      ].join("\r\n");

      triggerDownload(csv, `results_${fileStamp()}.csv`, "text/csv");
    }

    function downloadJSON(data) {
      triggerDownload(
        JSON.stringify(data, null, 2),
        `results_${fileStamp()}.json`,
        "application/json"
      );
    }

    function triggerDownload(content, filename, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function fileStamp() {
      return new Date().toISOString().slice(0, 19).replace(/[T:]/g, "-");
    }

    function renderBatchResult(id, data) {
      const results = Array.isArray(data?.results) ? data.results : [];
      const sorted = sortResults(id, results, "risk");
      const counts = summarizeBatch(id, results);
      return `
        <div class="summary-bar">
          <div class="summary-left">
            <strong>${results.length} files processed</strong>
            <span class="count-green">${counts.good} ✓</span>
            <span class="count-orange">${counts.warn} ⚠</span>
            <span class="count-red">${counts.bad} ✕</span>
          </div>
          <select class="sort-select" data-sort-results data-agent-id="${id}">
            <option value="risk">Sort by: Risk level</option>
            <option value="filename">Sort by: Filename</option>
            <option value="status">Sort by: Status</option>
          </select>
        </div>
        <div class="file-results" id="fileResults">${renderFilePanels(id, sorted)}</div>
      `;
    }

    function summarizeBatch(id, results) {
      return results.reduce((acc, result) => {
        const status = batchStatus(id, result);
        if (status === "good") acc.good += 1;
        else if (status === "warn") acc.warn += 1;
        else acc.bad += 1;
        return acc;
      }, { good: 0, warn: 0, bad: 0 });
    }

    function batchStatus(id, result) {
      if (result.error) return "bad";
      if (id === 1) return result.human_review_required ? "warn" : "good";
      if (id === 3) return result.decision === "APPROVED" ? "good" : result.decision === "REJECTED" ? "bad" : "warn";
      if (id === 4) {
        const score = Number(result.fraud_risk_score || 0);
        return score >= 0.7 ? "bad" : score >= 0.4 ? "warn" : "good";
      }
      return "good";
    }

    function primaryBadge(id, result) {
      if (result.error) return `<span class="tiny-pill high">Error</span>`;
      if (id === 1) return `<span class="tiny-pill ${deptKey(result)}">${safe(result.department, "Other")}</span>`;
      if (id === 3) return `<span class="tiny-pill ${result.decision === "APPROVED" ? "low" : result.decision === "REJECTED" ? "high" : "medium"}">${safe(result.decision)}</span>`;
      if (id === 4) return `<span class="risk-pill ${String(result.fraud_risk_level || "medium").toLowerCase()}">${safe(result.fraud_risk_level, "medium")}</span>`;
      return "";
    }

    function renderFilePanels(id, results) {
      return results.map((result, index) => {
        const status = batchStatus(id, result);
        const statusClass = status === "good" ? "" : status === "warn" ? "warn" : "error";
        const filename = result.filename || `Result ${index + 1}`;
        return `
          <article class="file-panel ${index === 0 ? "open" : ""}">
            <button class="panel-header" type="button">
              <span class="panel-left">
                <span class="status-icon ${statusClass}">${status === "good" ? "✓" : status === "warn" ? "!" : "×"}</span>
                <span class="file-title">
                  <span class="file-name">${escapeHtml(filename)}</span>
                  <span class="file-size">${escapeHtml(result.file_size || "")}</span>
                </span>
              </span>
              <span class="panel-right">
                ${primaryBadge(id, result)}
                <span class="chevron">${icon("chevron")}</span>
              </span>
            </button>
            <div class="panel-body"><div class="panel-content">${result.error ? `<div class="error-card">${escapeHtml(result.error)}</div>` : renderSingleResult(id, result)}</div></div>
          </article>
        `;
      }).join("");
    }

    function sortResults(id, results, key) {
      const copy = [...results];
      if (key === "filename") return copy.sort((a, b) => String(a.filename || "").localeCompare(String(b.filename || "")));
      if (key === "status") return copy.sort((a, b) => batchStatus(id, a).localeCompare(batchStatus(id, b)));
      return copy.sort((a, b) => riskRank(id, b) - riskRank(id, a));
    }

    function riskRank(id, result) {
      if (result.error) return 99;
      if (id === 1) return result.human_review_required ? 2 : 0;
      if (id === 3) return result.decision === "REJECTED" ? 3 : result.decision === "NEEDS_REVIEW" ? 2 : 0;
      if (id === 4) return Number(result.fraud_risk_score || 0) * 10;
      return 0;
    }

    function renderSingleResult(id, data) {
      const renderers = {
        1: renderInvoiceResult,
        2: renderShiftResult,
        3: renderPermitResult,
        4: renderCvResult,
        5: renderInterviewResult,
        6: renderMarketingResult,
        7: renderAnalyticsResult,
        8: renderPricingResult,
        9: renderGapResult,
        10: renderEmailResult,
      };
      return (renderers[id] || renderRawResult)(data);
    }

    function renderInvoiceResult(data) {
      const dept = safe(data.department, "Other");
      const color = deptColor(deptKey(data));
      const confidence = pct(data.confidence);
      const rows = [
        ["Vendor", data.vendor_name],
        ["Invoice no", data.invoice_number],
        ["Date", data.invoice_date],
        ["Due date", data.due_date],
        ["Amount", data.total_amount],
        ["Language", data.language],
      ];
      return `
        <div class="dept-banner" style="--dept-color:${color}">
          <div><div class="dept-name">${dept}</div><div class="dept-category">${safe(data.category, "Uncategorised")}</div></div>
          ${confidenceRing(confidence, color)}
        </div>
        <div class="result-grid">
          <div class="details-table">${rows.map(([label, value]) => `<div class="detail-row"><span class="label">${label}</span><span class="value">${safe(value)}</span></div>`).join("")}</div>
          <div>
            <span class="section-label">Line items</span>
            ${renderBulletList(data.line_items)}
          </div>
        </div>
        <div class="reason-box"><span class="reason-label">Routing reason</span>${safe(data.routing_reason, "Review routing decision manually.")}</div>
        ${data.human_review_required ? `<div class="notice-banner">${icon("alert")} <span>Requires human review before processing</span></div>` : ""}
      `;
    }

    function confidenceRing(confidence, color) {
      const radius = 18;
      const circumference = 2 * Math.PI * radius;
      const offset = circumference - (confidence / 100) * circumference;
      return `
        <div class="confidence-ring">
          <svg viewBox="0 0 44 44">
            <circle cx="22" cy="22" r="${radius}" stroke="var(--bg-border)" stroke-width="3" fill="none"></circle>
            <circle cx="22" cy="22" r="${radius}" stroke="${color}" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"></circle>
          </svg>
          <span>${confidence}%</span>
        </div>
      `;
    }

    function renderPermitResult(data) {
      const decision = String(data.decision || "NEEDS_REVIEW").toUpperCase();
      const cls = decision === "APPROVED" ? "approved" : decision === "REJECTED" ? "rejected" : "review";
      const color = cls === "approved" ? "var(--green)" : cls === "rejected" ? "var(--red)" : "var(--orange)";
      const conf = pct(data.confidence_percentage, 1);
      const details = [
        ["Permit type", data.permit_type],
        ["Holder name", data.holder_name],
        ["Valid from", data.valid_from],
        ["Valid until", data.valid_until],
        ["Issuing authority", data.issuing_authority],
        ["Document number", data.document_number],
      ];
      return `
        <div class="decision-hero">
          <div class="decision-badge ${cls}">${cls === "approved" ? "✓" : cls === "rejected" ? "×" : "!"} ${decision}</div>
          <div class="confidence-big" style="color:${color}">${conf}%</div>
          <div class="confidence-label">confidence</div>
        </div>
        <div class="details-grid">${details.map(([label, value]) => `<div class="detail-field"><div class="field-name">${label}</div><div class="field-value">${safe(value)}</div></div>`).join("")}</div>
        ${Array.isArray(data.flags) && data.flags.length ? `<div class="flags">${data.flags.map((flag) => `<div class="flag-item">${icon("alert")} <span>${escapeHtml(flag)}</span></div>`).join("")}</div>` : ""}
        <div class="reason-box decision-reason">${safe(data.decision_reason, "Manual validation recommended.")}</div>
      `;
    }

    function renderCvResult(data) {
      const score = Math.max(0, Math.min(1, Number(data.fraud_risk_score || 0)));
      const level = String(data.fraud_risk_level || (score > 0.7 ? "high" : score > 0.4 ? "medium" : "low")).toLowerCase();
      const color = score > 0.7 ? "var(--red)" : score > 0.4 ? "var(--orange)" : "var(--green)";
      const recommendation = data.recommendation || "verify_further";
      const recClass = recommendation === "proceed" ? "proceed" : recommendation === "reject" ? "reject" : "verify";
      const recText = recommendation === "proceed" ? "Proceed to interview" : recommendation === "reject" ? "Do not proceed" : "Verify before proceeding";
      return `
        <div class="risk-gauge-wrap">
          ${riskGauge(score, color)}
          <div class="risk-center">${Math.round(score * 100)}%</div>
          <div class="risk-pill ${level}">${escapeHtml(level)} risk</div>
        </div>
        <div class="candidate-name">${safe(data.candidate_name, "Candidate")}</div>
        <div class="three-cols">
          <div><span class="section-label">AI indicators</span>${renderBulletList(data.ai_generated_indicators)}</div>
          <div><span class="section-label">Inconsistencies</span>${renderBulletList(data.inconsistencies_found)}</div>
          <div><span class="section-label">Experience flags</span>${renderBulletList(data.experience_verification_flags)}</div>
        </div>
        <div class="assessment-box">${safe(data.overall_assessment, "No assessment returned.")}</div>
        <div class="recommendation-banner ${recClass}">${recClass === "proceed" ? "✓" : recClass === "reject" ? "×" : "!"} ${recText}</div>
      `;
    }

    function riskGauge(score, color) {
      const dash = Math.max(0, Math.min(100, score * 100));
      return `
        <svg class="risk-gauge" viewBox="0 0 220 130" aria-hidden="true">
          <path d="M30 110 A80 80 0 0 1 190 110" fill="none" stroke="var(--bg-border)" stroke-width="16" stroke-linecap="round"></path>
          <path d="M30 110 A80 80 0 0 1 190 110" fill="none" stroke="${color}" stroke-width="16" stroke-linecap="round" pathLength="100" stroke-dasharray="${dash} 100"></path>
        </svg>
      `;
    }

    function renderInterviewResult(data) {
      return `
        <div class="role-header">
          <div class="role-summary">${safe(data.role_summary, "Interview pack")}</div>
          <span class="seniority-pill">${safe(data.seniority_level, "Mid")}</span>
        </div>
        <div class="question-grid">
          <div class="question-column">
            <span class="section-label">Technical questions</span>
            ${(data.technical_questions || []).slice(0, 5).map((question, i) => renderQuestion(question, i + 1, false)).join("")}
          </div>
          <div class="question-column">
            <span class="section-label">Behavioural questions</span>
            ${(data.behavioural_questions || []).slice(0, 3).map((question, i) => renderQuestion(question, i + 1, true)).join("")}
          </div>
        </div>
        <div class="red-flags">
          <span class="section-label">Red flags to watch for</span>
          <ul class="dot-list">${(data.red_flags || []).map((flag) => `<li><span class="red-dot"></span><span>${escapeHtml(flag)}</span></li>`).join("")}</ul>
        </div>
        <div class="scoring-box">${safe(data.suggested_scoring_criteria, "Score answers against role-relevant evidence and consistency.")}</div>
        <div class="compliance-notice">! ${safe(data.human_review_notice, "These questions must be reviewed by HR before use.")}</div>
      `;
    }

    function renderQuestion(question, index, purple) {
      return `
        <article class="question-card">
          <div class="question-top">
            <span class="q-badge ${purple ? "purple" : ""}">Q${index}</span>
            <button class="icon-btn" type="button" data-copy-text="${escapeHtml(question)}" aria-label="Copy question">${icon("copy")}</button>
          </div>
          <div class="question-text">${escapeHtml(question)}</div>
        </article>
      `;
    }

    function renderPricingResult(data) {
      const direction = data.price_direction || "hold";
      const change = Number(data.price_change_percentage || 0);
      const color = direction === "increase" ? "var(--green)" : direction === "decrease" ? "var(--brand)" : "var(--text-muted)";
      const arrow = direction === "increase" ? "↑" : direction === "decrease" ? "↓" : "→";
      return `
        <div class="price-hero">
          <div class="price-line">
            <span class="old-price">${money(data.base_price)}</span>
            <span class="price-arrow" style="color:${color}">${arrow}</span>
            <span class="new-price" style="color:${color}">${money(data.recommended_price)}</span>
          </div>
          <span class="change-badge" style="background:${direction === "hold" ? "var(--bg-elevated)" : direction === "increase" ? "var(--green-bg)" : "var(--brand-muted)"}; color:${color}">${change > 0 ? "+" : ""}${change.toFixed(1)}%</span>
          <div class="valid-until">Valid until ${safe(data.valid_until, "not_found")}</div>
        </div>
        ${data.human_approval_required ? `<div class="approval-banner notice-banner">${icon("alert")} <span>Change exceeds 15% - requires human approval</span></div>` : ""}
        <div class="signals-table">
          <div class="signals-row header"><span>Signal</span><span>Impact</span><span>Weight</span><span>Reasoning</span></div>
          ${(data.signals_applied || []).map((signal) => `
            <div class="signals-row">
              <span>${safe(signal.signal)}</span>
              <span class="impact-badge ${safe(signal.impact, "neutral")}">${safe(signal.impact, "neutral")}</span>
              <span><span class="weight-track"><span class="weight-bar" style="width:${pct(signal.weight)}%"></span></span></span>
              <span>${safe(signal.reasoning)}</span>
            </div>
          `).join("")}
        </div>
        ${Array.isArray(data.guardrail_flags) && data.guardrail_flags.length ? `<div class="guardrails">${data.guardrail_flags.map((flag) => `<div class="guardrail">${icon("shield")} <span>${escapeHtml(flag)}</span></div>`).join("")}</div>` : ""}
        <div class="reasoning-box">${safe(data.reasoning, "Price recommendation generated within configured guardrails.")}</div>
      `;
    }

    function renderGapResult(data) {
      return `
        <div class="white-summary">
          <div>${safe(data.white_space_summary, "No white-space summary returned.")}</div>
          <div class="confidence-note">Confidence ${pct(data.confidence_level)}%</div>
        </div>
        <div class="gaps-grid">
          ${(data.gaps_identified || []).map((gap) => `
            <article class="gap-card">
              <h3>${safe(gap.gap_name)}</h3>
              <div class="badge-row">
                <span class="tiny-pill ${safe(gap.opportunity_size, "small")}">${safe(gap.opportunity_size, "small")} opportunity</span>
                <span class="tiny-pill ${safe(gap.difficulty, "medium")}">${safe(gap.difficulty, "medium")} difficulty</span>
              </div>
              <div class="gap-reasoning">${safe(gap.reasoning)}</div>
            </article>
          `).join("")}
        </div>
        <div class="ranked-list">
          <span class="section-label">Recommended products</span>
          ${(data.recommended_new_products || []).map((product, i) => `
            <div class="ranked-item">
              <div class="rank-num">${i + 1}</div>
              <div>
                <div class="badge-row" style="margin-top:0"><strong>${safe(product.name)}</strong><span class="priority-pill ${safe(product.priority, "medium")}">${safe(product.priority, "medium")}</span></div>
                <div class="product-rationale">${safe(product.rationale)}</div>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderEmailResult(data) {
      const level = String(data.security_risk_level || "suspicious").toLowerCase();
      const isBlocked = level === "blocked" || data.injection_detected;
      const docs = data.documents_present || {};
      const labels = [
        ["cv", "CV"],
        ["residence_permit", "Residence permit"],
        ["work_permit", "Work permit"],
        ["criminal_record_statement", "Criminal record statement"],
      ];
      const presentCount = labels.filter(([key]) => docs[key]).length;
      return `
        <div class="security-hero ${isBlocked ? "blocked" : level}">
          <div class="security-icon">${isBlocked ? icon("alert") : level === "safe" ? icon("check") : icon("shield")}</div>
          <div class="security-title">${isBlocked ? "BLOCKED - INJECTION DETECTED" : level === "safe" ? "SAFE" : "SUSPICIOUS"}</div>
        </div>
        ${data.injection_detected ? `
          <div class="injection-box">
            <strong>Injection indicators detected:</strong>
            <div class="chip-row">${(data.injection_indicators || []).map((item) => `<span class="code-chip">${escapeHtml(item)}</span>`).join("")}</div>
          </div>
        ` : ""}
        <div class="summary-box"><span class="reason-label">Sanitized summary</span>${safe(data.sanitized_summary, "No summary returned.")}</div>
        <div class="doc-list">
          ${labels.map(([key, label]) => `
            <div class="check-row">
              <span class="check-icon ${docs[key] ? "ok" : "no"}">${docs[key] ? "✓" : "×"}</span>
              <span class="doc-name">${label}</span>
              <span class="doc-status">${docs[key] ? "Present" : "Missing"}</span>
            </div>
          `).join("")}
        </div>
        <div class="completion">
          <div>${presentCount} of ${labels.length} documents present</div>
          <div class="progress-track" style="margin-top:8px"><div class="progress-bar" style="width:${(presentCount / labels.length) * 100}%"></div></div>
        </div>
        <div class="recommended-action"><span class="reason-label">Recommended action</span>${safe(data.recommended_action, "Route to HR review.")}</div>
      `;
    }

    function renderMarketingResult(data) {
      const specs = data.platform_specs || {};
      return `
        <div class="platform-row">
          ${String(data.platform || "Both").includes("TikTok") || data.platform === "Both" ? `<span class="platform-pill">TikTok</span>` : ""}
          ${String(data.platform || "Both").includes("Instagram") || data.platform === "Both" ? `<span class="platform-pill" style="background:rgba(163,113,247,0.14);color:var(--purple)">Instagram</span>` : ""}
        </div>
        <div class="duration-large">${safe(data.content_duration_seconds, 30)} seconds</div>
        <div class="hook-box">
          <span class="reason-label">HOOK - First 3 seconds</span>
          <div class="hook-text">${safe(data.hook_text, "Open with the product moment.")}</div>
          <div class="badge-row"><span class="tiny-pill medium">${safe(data.hook_type, "statement")}</span></div>
        </div>
        <div class="timeline">
          ${(data.scene_breakdown || []).map((scene) => `
            <article class="scene-card">
              <h3>Scene ${safe(scene.scene_number, "1")} · ${safe(scene.duration_seconds, "5")}s</h3>
              <div class="scene-line"><strong>Visual:</strong> ${safe(scene.visual)}</div>
              <div class="scene-line"><strong>Text:</strong> ${safe(scene.text_overlay)}</div>
              <div class="scene-line"><strong>Voice:</strong> ${safe(scene.voiceover)}</div>
            </article>
          `).join("")}
        </div>
        <div class="safe-zone-grid">
          ${renderPlatformSpecs("TikTok", specs.tiktok, false)}
          ${renderPlatformSpecs("Instagram", specs.instagram, true)}
        </div>
        <div class="hashtags">
          <span class="section-label">Hashtags</span>
          <div class="chip-row">${(data.suggested_hashtags || []).map((tag) => `<span class="hashtag-pill">${escapeHtml(tag.startsWith("#") ? tag : `#${tag}`)}</span>`).join("")}</div>
        </div>
        ${Array.isArray(data.content_warnings) && data.content_warnings.length ? `<div class="notice-banner">${icon("alert")} <span>${data.content_warnings.map(escapeHtml).join(" · ")}</span></div>` : ""}
      `;
    }

    function renderPlatformSpecs(name, spec = {}, instagram = false) {
      const text = `${name}: ${spec.text_safe_zone || ""}; ${spec.ui_overlay_margin || ""}; ${spec.recommended_duration || ""}`;
      return `
        <article class="platform-card ${instagram ? "instagram" : ""}">
          <div class="platform-card-header">${name}</div>
          <div class="platform-card-body">
            <div class="spec-row"><span>Safe zone</span><span>${safe(spec.text_safe_zone, "not_found")}</span></div>
            <div class="spec-row"><span>UI margin</span><span>${safe(spec.ui_overlay_margin, "not_found")}</span></div>
            <div class="spec-row"><span>Duration</span><span>${safe(spec.recommended_duration, "not_found")}</span></div>
            <button class="secondary-btn" type="button" data-copy-text="${escapeHtml(text)}">${icon("copy")} Copy specs</button>
          </div>
        </article>
      `;
    }

    function renderAnalyticsResult(data) {
      const lift = Number(data.predicted_lift_percentage || 0);
      const color = lift > 25 ? "var(--green)" : lift > 10 ? "var(--brand)" : "var(--text-secondary)";
      const timing = data.optimal_ad_timing || {};
      return `
        <div class="lift-hero">
          <div class="lift-number" style="color:${color}">${lift.toFixed(1)}%</div>
          <div class="lift-label">predicted ad lift</div>
        </div>
        <div class="timing-box">
          <div><span class="section-label">Days</span><div class="timing-value">${safe(timing.day_of_week, "not_found")}</div></div>
          <div><span class="section-label">Times</span><div class="timing-value">${safe(timing.time_of_day, "not_found")}</div></div>
          <div class="timing-reasoning">${safe(timing.reasoning, "No timing rationale returned.")}</div>
        </div>
        <div class="segments-grid">
          ${(data.key_segments || []).map((segment) => `
            <article class="segment-card">
              <h3>${safe(segment.segment_name)}</h3>
              <span class="value-badge ${safe(segment.value_score, "medium")}">${safe(segment.value_score, "medium")} value</span>
              <div class="segment-pattern">${safe(segment.size_estimate)}</div>
              <div class="segment-pattern">${safe(segment.behaviour_pattern)}</div>
            </article>
          `).join("")}
        </div>
        <ul class="signals-list">
          ${(data.targeting_signals || []).map((signal) => `<li><span class="arrow">→</span><span>${escapeHtml(signal)}</span></li>`).join("")}
        </ul>
        <div class="channel-row">${(data.recommended_channels || []).map((channel) => `<span class="channel-pill">${escapeHtml(channel)}</span>`).join("")}</div>
        <div class="seasonal-box">${safe(data.seasonal_patterns, "No seasonal patterns returned.")}</div>
        <div class="data-quality-box">ⓘ ${safe(data.data_quality_notes, "No data quality notes returned.")}</div>
      `;
    }

    function renderShiftResult(data) {
      return `
        <div class="shift-hero">
          <div class="mini-card"><span class="section-label">Date</span><h3>${safe(data.shift_date)}</h3></div>
          <div class="mini-card"><span class="section-label">Time</span><h3>${safe(data.shift_time)}</h3></div>
          <div class="mini-card"><span class="section-label">Role</span><h3>${safe(data.required_role)}</h3></div>
        </div>
        <div class="badge-row" style="margin-bottom:16px"><span class="priority-pill ${safe(data.urgency_level, "high")}">${safe(data.urgency_level, "high")} urgency</span><span class="tiny-pill medium">Human review required</span></div>
        <span class="section-label">Available staff</span>
        <div class="staff-list">
          ${(data.available_staff || []).map((staff) => `
            <article class="staff-card">
              <div class="staff-name">${safe(staff.name)}</div>
              <div class="staff-role">${safe(staff.role)}</div>
              <div class="segment-pattern">${safe(staff.reason_available)}</div>
            </article>
          `).join("")}
        </div>
        <div class="reason-box"><span class="reason-label">Recommended contact order</span>${(data.recommended_contact_order || []).map(escapeHtml).join(" → ") || "not_found"}</div>
        <div class="draft-box"><span class="reason-label">Draft message</span>${safe(data.draft_message)}</div>
      `;
    }

    function renderRawResult(data) {
      return `<pre class="raw-json">${escapeHtml(JSON.stringify(data, null, 2))}</pre>`;
    }

    function renderBulletList(items) {
      const list = Array.isArray(items) ? items.filter(Boolean) : [];
      if (!list.length) return `<p class="customer">None detected</p>`;
      return `<ul class="bullet-list">${list.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`;
    }

    function init() {
      mobileMenuBtn.innerHTML = icon("menu");
      mobileMenuBtn.addEventListener("click", () => document.body.classList.toggle("sidebar-open"));
      sidebarList.addEventListener("click", (event) => {
        const button = event.target.closest("[data-agent-id]");
        if (button) navigateTo("detail", Number(button.dataset.agentId));
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && state.currentPage === "detail") {
          navigateTo("grid");
        }
        if (event.key === "/" && !["INPUT", "TEXTAREA", "SELECT"].includes(document.activeElement.tagName)) {
          event.preventDefault();
          if (state.currentPage !== "grid") navigateTo("grid");
          setTimeout(() => document.getElementById("agentSearch")?.focus(), 0);
        }
      });
      renderAgentGrid();
    }

    init();
  </script>
</body>
</html>
